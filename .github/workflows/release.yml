name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            archive: tar.gz
          - os: macos-14
            target: x86_64-apple-darwin
            ext: ""
            archive: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            ext: ""
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare dist (unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          NAME="mpa"
          DIST="dist/${NAME}-${VERSION}-${{ matrix.target }}"
          mkdir -p "$DIST"
          cp "target/${{ matrix.target }}/release/${NAME}${{ matrix.ext }}" "$DIST/"
          cp -R "dist/.trae" "$DIST/" || true
          cp -R "scripts" "$DIST/" || true
          tar -C "dist" -czf "${NAME}-${VERSION}-${{ matrix.target }}.tar.gz" "${NAME}-${VERSION}-${{ matrix.target }}"
          ls -la "dist" || true

      - name: Prepare dist (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Version = $env:GITHUB_REF_NAME
          $Name = "mpa"
          $Target = "${{ matrix.target }}"
          $Dist = "dist/$Name-$Version-$Target"
          New-Item -ItemType Directory -Force -Path $Dist | Out-Null
          Copy-Item "target/$Target/release/$Name${{ matrix.ext }}" -Destination $Dist
          if (Test-Path "dist/.trae") { Copy-Item "dist/.trae" -Destination $Dist -Recurse -Force }
          if (Test-Path "scripts") { Copy-Item "scripts" -Destination $Dist -Recurse -Force }
          Compress-Archive -Path $Dist -DestinationPath "$Name-$Version-$Target.zip" -Force

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.zip
